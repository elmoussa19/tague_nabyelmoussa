<app-loader [isLoading]="isLoading"></app-loader>
<body class="bg-gradient-to-br from-blue-100 via-purple-50 to-white min-h-screen text-gray-800 flex font-sans">
  <!-- Sidebar -->
  <app-sidebar class="fixed w-64 h-full bg-white shadow-2xl z-10 rounded-r-3xl"></app-sidebar>

  <!-- Contenu principal -->
  <div class="ml-64 flex-1">
    <div class="p-8">
      <!-- Header -->
      <section class="text-center py-10 px-4">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 via-pink-500 to-red-400">
          <i class="ri-image-line"></i> Galerie des Images
        </h1>
        <p class="text-gray-500 mt-2 text-lg">Découvrez nos plus belles créations artistiques</p>

        <!-- Search + Add -->
        <div class="mt-8 max-w-3xl mx-auto flex gap-3">
          <input
            [(ngModel)]="searchTerm"
            (input)="searchGaleries()"
            type="text"
            placeholder="Rechercher une image par titre, description ou domaine..."
            class="w-full px-5 py-3 rounded-full border border-purple-200 shadow-md focus:outline-none focus:ring-2 focus:ring-purple-400 transition"
          />
          <button
            (click)="toggleForm()"
            class="bg-gradient-to-r from-purple-600 to-pink-500 text-white px-5 py-3 rounded-full hover:brightness-110 transition text-sm font-semibold flex items-center gap-2 shadow-md"
            [disabled]="isButtonLoading['add']"
          >
            <i *ngIf="!isButtonLoading['add']" class="ri-add-line text-lg"></i>
            <i *ngIf="isButtonLoading['add']" class="ri-loader-4-line animate-spin text-lg"></i>
            {{ isButtonLoading['add'] ? 'Chargement...' : 'Ajouter' }}
          </button>
        </div>

        <!-- Nombre d'images -->
        <div class="mt-5 inline-flex items-center gap-2 bg-purple-100 text-purple-700 px-5 py-2 rounded-full text-sm font-medium shadow-sm">
          <i class="ri-gallery-line"></i> {{ filteredGaleries.length }} Images
        </div>
      </section>

      <!-- Formulaire d'ajout -->
      <section id="addForm" class="max-w-3xl mx-auto px-6 pb-10 transition-all duration-300" [ngClass]="{ 'hidden': !showForm }">
        <form (ngSubmit)="saveGalerie()" class="bg-white p-6 rounded-3xl shadow-lg space-y-5 border border-purple-100">
          <input
            type="text"
            [(ngModel)]="titre"
            name="titre"
            placeholder="Titre de l'image"
            class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400"
            required
          />

          <div>
            <div *ngIf="selectedGalerie && currentImageUrl" class="mb-2">
              <p class="text-sm text-gray-600">Image actuelle :</p>
              <img [src]="currentImageUrl" alt="Image actuelle" class="h-24 w-auto rounded-xl shadow" />
            </div>
            <input
              type="file"
              (change)="onFileSelected($event)"
              accept=".jpg,.jpeg,.png,.gif,.svg"
              class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400"
              [required]="!selectedGalerie"
            />
          </div>

          <input
            type="text"
            [(ngModel)]="domaine"
            name="domaine"
            placeholder="Domaine artistique (Pop, Électro…)"
            class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400"
          />

          <textarea
            [(ngModel)]="description"
            name="description"
            placeholder="Description de l'image"
            class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400"
          ></textarea>

          <div class="flex gap-2 justify-end">
            <button
              type="submit"
              [disabled]="isLoading || !titre"
              class="bg-green-500 text-white px-6 py-2 rounded-full hover:bg-green-600 transition font-semibold"
            >
              Enregistrer
            </button>
            <button
              type="button"
              (click)="toggleForm()"
              class="bg-gray-400 text-white px-6 py-2 rounded-full hover:bg-gray-500 transition"
            >
              Annuler
            </button>
          </div>
        </form>
      </section>

      <!-- Cartes -->
      <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto px-6 pb-12">
        <div *ngFor="let galerie of filteredGaleries; let i = index" class="bg-white rounded-3xl shadow-xl overflow-hidden relative group hover:shadow-2xl transition">
          <img [src]="getImageUrl(galerie.image)" [alt]="galerie.titre" class="h-48 w-full object-cover" />
          <div class="p-4">
            <h2 class="font-bold text-xl text-purple-700">{{ galerie.titre }}</h2>
            <p class="text-sm text-gray-500 mt-1">{{ galerie.description || 'Aucune description' }}</p>
            <div class="mt-3 text-purple-600 text-sm font-medium flex items-center gap-1">
              <i class="ri-music-2-line"></i> {{ galerie.domaine || 'Inconnu' }}
            </div>
          </div>
          <div class="absolute top-2 right-2 flex gap-2 opacity-0 group-hover:opacity-100 transition">
            <button
              (click)="editGalerie(galerie.id!)"
              class="text-blue-500 hover:text-blue-700 text-xl"
              [disabled]="isButtonLoading['edit_' + galerie.id]"
            >
              <i *ngIf="!isButtonLoading['edit_' + galerie.id]" class="ri-edit-line"></i>
              <i *ngIf="isButtonLoading['edit_' + galerie.id]" class="ri-loader-4-line animate-spin"></i>
            </button>
            <button
              (click)="deleteGalerie(galerie.id!)"
              class="text-red-500 hover:text-red-700 text-xl"
              [disabled]="isButtonLoading['delete_' + galerie.id]"
            >
              <i *ngIf="!isButtonLoading['delete_' + galerie.id]" class="ri-delete-bin-6-line"></i>
              <i *ngIf="isButtonLoading['delete_' + galerie.id]" class="ri-loader-4-line animate-spin"></i>
            </button>
          </div>
        </div>

        <!-- Message si vide -->
        <p *ngIf="!filteredGaleries.length && !isLoading" class="text-center text-gray-500 col-span-full">
          Aucune image disponible pour le moment.
        </p>
        <p *ngIf="isLoading" class="text-center text-gray-500 col-span-full animate-pulse">
          Chargement des images...
        </p>
      </section>

      <!-- Modal personnalisée -->
      <app-modal
        [isVisible]="showCustomModal"
        [modalType]="modalConfig.type"
        [title]="modalConfig.title"
        [message]="modalConfig.message"
        [icon]="modalConfig.icon"
        (confirm)="onModalConfirm()"
        (cancel)="onModalCancel()"
      ></app-modal>
    </div>
  </div>
</body>
