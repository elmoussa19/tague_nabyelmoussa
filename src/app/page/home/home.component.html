<app-loader [isLoading]="isLoading"></app-loader>
<app-navbar></app-navbar>
<body class="bg-gradient-to-br from-purple-100 via-blue-50 to-white text-gray-800 min-h-screen">
  <div class="max-w-6xl mx-auto p-8 animate-fadeInUp">
    <!-- Titre -->
    <h1 class="text-4xl font-extrabold text-center bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent mb-3 tracking-wide">
      <i class="ri-music-2-fill mr-2 animate-pulse-slow text-4xl"></i>Mes Chanteurs
    </h1>
    <p class="text-center text-base text-gray-600 mb-8 italic font-medium drop-shadow-sm">
      Gérez votre collection de chanteurs préférés avec leurs biographies et photos
    </p>

    <!-- Barre de recherche et bouton -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 animate-slideInUp">
      <div class="relative w-full md:w-1/2">
        <input
          type="text"
          placeholder="Rechercher un chanteur..."
          [(ngModel)]="searchTerm"
          (ngModelChange)="searchChanteurs()"
          class="w-full px-4 py-3 pl-10 border border-gray-200 rounded-xl shadow-sm focus:ring-2 focus:ring-purple-400 outline-none transition-all duration-300 bg-white"
        />
        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>
      <button
        (click)="addChanteur()"
        class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 py-3 rounded-xl hover:scale-105 transition-all shadow-lg flex items-center gap-2"
        [disabled]="isButtonLoading['add']"
      >
        <i *ngIf="!isButtonLoading['add']" class="ri-add-line text-lg"></i>
        <i *ngIf="isButtonLoading['add']" class="ri-loader-4-line animate-spin text-lg"></i>
        {{ isButtonLoading['add'] ? 'Chargement...' : 'Ajouter un chanteur' }}
      </button>
    </div>

    <!-- Statistiques -->
    <div class="bg-gradient-to-r from-purple-50 to-white p-5 rounded-xl shadow-md flex justify-between items-center text-sm text-gray-700 mb-8 animate-slideInUp">
      <div>Total des chanteurs : <span class="font-bold text-purple-600">{{ chanteurs.length }}</span></div>
      <div>Résultats affichés : <span class="font-bold text-blue-600">{{ filteredChanteurs.length }}</span></div>
    </div>

    <!-- Cartes des chanteurs -->
    <div class="grid md:grid-cols-3 gap-6">
      <div
        *ngFor="let chanteur of filteredChanteurs"
        class="bg-white rounded-2xl shadow-md hover:shadow-xl hover:scale-105 transition-all duration-300 overflow-hidden animate-fadeInUp"
      >
        <div class="relative overflow-hidden">
          <img
            [src]="getImageUrl(chanteur.image)"
            [alt]="chanteur.nom"
            class="h-48 w-full object-cover transform hover:scale-110 transition-transform duration-500"
          />
        </div>
        <div class="p-5">
          <h2 class="text-xl font-semibold text-gray-800 mb-2">{{ chanteur.nom }}</h2>
          <p class="text-sm text-gray-600 line-clamp-3">
            {{ chanteur.bibliographie || 'Aucune biographie disponible' }}
          </p>

          <!-- Voir le dashboard -->
          <button
            (click)="goToSingerDashboard(chanteur.id)"
            class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white text-sm px-4 py-2 mt-4 rounded-lg flex justify-center items-center gap-2 transition-all shadow"
          >
            <i class="ri-login-circle-line"></i>Voir le dashboard
          </button>

          <!-- Modifier / Supprimer -->
          <div class="mt-4 flex justify-between gap-3">
            <button
              (click)="editChanteur(chanteur.id)"
              class="w-1/2 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white text-sm py-2 rounded-lg transition-all flex justify-center items-center gap-2 shadow"
              [disabled]="isButtonLoading['edit_' + chanteur.id]"
            >
              <i *ngIf="!isButtonLoading['edit_' + chanteur.id]" class="ri-edit-line"></i>
              <i *ngIf="isButtonLoading['edit_' + chanteur.id]" class="ri-loader-4-line animate-spin"></i>
              {{ isButtonLoading['edit_' + chanteur.id] ? 'Chargement...' : 'Modifier' }}
            </button>
            <button
              (click)="deleteChanteur(chanteur.id)"
              class="w-1/2 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white text-sm py-2 rounded-lg transition-all flex justify-center items-center gap-2 shadow"
              [disabled]="isButtonLoading['delete_' + chanteur.id]"
            >
              <i *ngIf="!isButtonLoading['delete_' + chanteur.id]" class="ri-delete-bin-line"></i>
              <i *ngIf="isButtonLoading['delete_' + chanteur.id]" class="ri-loader-4-line animate-spin"></i>
              {{ isButtonLoading['delete_' + chanteur.id] ? 'Chargement...' : 'Supprimer' }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal du formulaire -->
    <app-singer-form
      *ngIf="showModal"
      [chanteur]="selectedChanteur"
      (save)="handleSave($event)"
      (cancel)="handleCancel()"
    ></app-singer-form>

    <!-- Modal personnalisée -->
    <app-modal
      [isVisible]="showCustomModal"
      [modalType]="modalConfig.type"
      [title]="modalConfig.title"
      [message]="modalConfig.message"
      [icon]="modalConfig.icon"
      (confirm)="onModalConfirm()"
      (cancel)="onModalCancel()"
    ></app-modal>
  </div>
</body>
