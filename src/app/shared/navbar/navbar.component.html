<nav class="bg-gradient-to-r from-purple-50 to-white shadow-lg px-6 py-4 flex items-center justify-between animate-fadeInDown transition-all duration-500 ease-in-out">
  <!-- Logo et titre -->
  <div class="flex items-center gap-4">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727240.png" alt="Logo" class="w-12 h-12 rounded-full shadow-md transform hover:scale-105 transition duration-300" />
    <div>
      <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent tracking-wide">Tague Naby</h1>
      <p class="text-sm text-gray-500">Interface d'administration</p>
    </div>
  </div>

  <!-- Droite : Liens de navigation et Profil -->
  <div class="flex items-center gap-6">
    <!-- Liens pour utilisateurs non connectés -->
    <div *ngIf="!authService.isAuthenticated()" class="flex gap-4">
      <a routerLink="/login" class="text-gray-700 hover:text-purple-600 font-medium transition duration-300">Se connecter</a>
      <a routerLink="/register" class="text-gray-700 hover:text-purple-600 font-medium transition duration-300">S'inscrire</a>
    </div>

    <!-- Liens pour utilisateurs connectés -->
    <div *ngIf="authService.isAuthenticated()" class="flex items-center gap-4">
      <!-- Notification avec badge -->
      <div class="relative hover:scale-110 transition-transform duration-300">
        <i class="ri-notification-3-line text-2xl text-gray-700"></i>
        <span class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-purple-100 animate-ping-slow"></span>
      </div>

      <!-- Utilisateur -->
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-purple-600 to-blue-600 flex items-center justify-center text-white font-semibold shadow-md">
          {{ authService.getCurrentUser()?.name?.charAt(0) || 'U' }}
        </div>
        <div class="text-right">
          <p class="text-sm font-semibold text-gray-800">{{ authService.getCurrentUser()?.name || 'Utilisateur' }}</p>
          <p class="text-xs text-gray-500">Admin</p>
        </div>
      </div>

      <!-- Bouton de déconnexion -->
      <button
        (click)="logout()"
        [disabled]="isButtonLoading"
        class="text-gray-700 hover:bg-gradient-to-r hover:from-purple-600 hover:to-blue-600 hover:text-white transition-colors duration-300 font-medium flex items-center gap-2 px-3 py-1 rounded-lg"
      >
        <i *ngIf="isButtonLoading" class="ri-loader-4-line animate-spin"></i>
        {{ isButtonLoading ? 'Déconnexion...' : 'Déconnexion' }}
      </button>
    </div>
  </div>
</nav>
