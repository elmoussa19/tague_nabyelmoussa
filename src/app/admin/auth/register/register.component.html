<app-navbar></app-navbar>
<app-loader [isLoading]="isButtonLoading"></app-loader>
<body class="bg-gradient-to-br from-purple-100 to-white min-h-screen flex items-center justify-center">
  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md text-center">
    <div class="flex justify-center mb-4">
      <div class="bg-purple-100 p-4 rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </div>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Tague Naby</h1>
    <p class="text-sm text-gray-500 mb-6">Créer un compte</p>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="space-y-4">
      <div class="text-left">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
        <div class="relative">
          <input
            type="text"
            placeholder="Entrez votre nom"
            [(ngModel)]="name"
            name="name"
            required
            class="w-full px-4 py-2 pl-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 placeholder-gray-400"
          />
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
        </div>
      </div>

      <div class="text-left">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <div class="relative">
          <input
            type="email"
            placeholder="Entrez votre email"
            [(ngModel)]="email"
            name="email"
            required
            email
            class="w-full px-4 py-2 pl-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 placeholder-gray-400"
          />
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
          </div>
        </div>
      </div>

      <div class="text-left">
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <div class="relative">
          <input
            type="password"
            placeholder="Entrez votre mot de passe"
            [(ngModel)]="password"
            name="password"
            required
            class="w-full px-4 py-2 pl-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 placeholder-gray-400"
          />
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.104-.896 2-2 2s-2-.896-2-2 2-4 2-4 2 .896 2 2zm0 0c0 1.104-.896 2-2 2s-2-.896-2-2m4 6H8m4 4H8" />
            </svg>
          </div>
        </div>
      </div>

      <div class="text-left">
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirmer le mot de passe</label>
        <div class="relative">
          <input
            type="password"
            placeholder="Confirmez votre mot de passe"
            [(ngModel)]="password_confirmation"
            name="password_confirmation"
            required
            class="w-full px-4 py-2 pl-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 placeholder-gray-400"
          />
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.104-.896 2-2 2s-2-.896-2-2 2-4 2-4 2 .896 2 2zm0 0c0 1.104-.896 2-2 2s-2-.896-2-2m4 6H8m4 4H8" />
            </svg>
          </div>
        </div>
      </div>

      <div class="text-left">
        <label class="block text-sm font-medium text-gray-700 mb-1">Image de profil</label>
        <div class="relative">
          <input
            type="file"
            (change)="onFileChange($event)"
            accept=".jpg,.jpeg,.png,.gif,.svg"
            class="w-full px-4 py-2 pl-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
          />
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </div>
        </div>
      </div>

      <div *ngIf="errorMessage" class="text-red-500 text-sm">{{ errorMessage }}</div>

      <button
        type="submit"
        [disabled]="!registerForm.valid || isButtonLoading"
        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-2 rounded-lg hover:from-purple-700 hover:to-blue-700 transition flex items-center justify-center gap-2"
      >
        <i *ngIf="isButtonLoading" class="ri-loader-4-line animate-spin"></i>
        {{ isButtonLoading ? 'Inscription...' : 'S\'inscrire' }}
      </button>
    </form>

    <p class="text-sm text-gray-500 mt-6">
      Déjà un compte ? <a routerLink="/login" class="text-purple-600 hover:underline">Se connecter</a>
    </p>
  </div>
</body>
